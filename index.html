<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container py-5">

        <!-- Search Bar -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-6">
                <form onsubmit="event.preventDefault(); searchPokemon(searchInput.value || 'pikachu')">
                    <div class="input-group shadow-sm">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search for a Pokémon"
                            aria-label="Search for a Pokémon">
                        <button type="submit" class="btn btn-primary" id="searchButton">
                            Search
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Error message -->
        <div id="errorMessage" class="alert alert-danger alert-dismissible fade show hidden text-center shadow-sm"
            role="alert">
            <div id="errorText">
                Oops! There is no Pokémon with that name.
            </div>
            <br>
            <small class="text-muted">Check the spelling and try again.</small>

            <button type="button" class="btn-close" aria-label="Close"
                onclick="this.parentElement.classList.add('hidden')">
            </button>
        </div>

        <!-- Card -->
        <div class="row justify-content-center hidden" id="pokemonCard">
            <div class="col-md-4">
                <div class="card shadow-sm h-100 text-center">

                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png"
                        class="card-img-top bg-light p-4" id="pokemonImage" alt="Pokémon Image">

                    <div class="card-body">
                        <h5 class="card-title text-capitalize" id="pokemonName"></h5>

                        <p class="card-text text-muted" id="pokemonDescription">

                        </p>

                        <a href="#" class="btn btn-outline-primary">
                            View details
                        </a>
                    </div>

                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center">
            <div class="spinner-border text-primary hidden" role="status" id="loadingSpinner">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>

</html>
